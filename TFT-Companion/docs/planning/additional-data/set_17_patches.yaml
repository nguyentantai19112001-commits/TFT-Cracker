# ==============================================================================
# PATCH 1 — pool_sizes distinct counts
# ==============================================================================
# WHY: original used generic Set 11+ baseline (13/13/13/12/8). Claude Code's
# game_assets.CHAMPIONS list shows Set 17 has 14/13/13/13/10 distinct champions.
# Old copies_per_champ values are correct (22/20/17/10/9) — only distinct changes.
# 5-cost distinct=10 is total; effective pool at game start is 9 (Zed gated).
# Until the user confirms if another 5-cost is gated, use 9. If another is gated
# later, update here.

pool_sizes:
  1: {copies_per_champ: 22, distinct: 14}  # total tier pool 308 (was 286)
  2: {copies_per_champ: 20, distinct: 13}  # total 260 — unchanged
  3: {copies_per_champ: 17, distinct: 13}  # total 221 — unchanged
  4: {copies_per_champ: 10, distinct: 13}  # total 130 (was 120)
  5: {copies_per_champ: 9,  distinct: 9}   # total 81; 10 in catalog minus Zed gate
  # NOTE: if the user confirms another 5-cost is gated, change distinct to 8.


