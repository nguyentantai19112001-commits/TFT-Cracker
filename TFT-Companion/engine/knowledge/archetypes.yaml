# engine/knowledge/archetypes.yaml — Set 17 "Space Gods" comp archetypes
# 20 archetypes shipped for v3 initial release.
# Sources: TFTAcademy, bunnymuffins.lol, Mobalytics (patch 17.1B).
# ⚠️ = data estimated / not confirmed from primary source
# ❌ = field missing — must be added before using in production

archetypes:

  # ── S-TIER ──────────────────────────────────────────────────────────────────

  vex_9_5:
    display_name: "Vex 9-5 Fast 9"
    tier: "S"
    style: "fast_9"
    difficulty: "hard"
    core_units:
      - TFT17_Vex
      - TFT17_Blitzcrank
      - TFT17_Bard
      - TFT17_Shen
      - TFT17_Rammus
      - TFT17_Karma
      - TFT17_Mordekaiser
      - TFT17_Rhaast
    primary_carry: TFT17_Vex
    secondary_carry: TFT17_Blitzcrank
    breakpoints:
      Meeple: 3
      Bastion: 2
      Voyager: 2
      DarkStar: 2
      PartyAnimal: 1
      Doomer: 1
      Vanguard: 2
      Conduit: 2
      SpaceGroove: 1
    stage_gate: [3, 5]
    game_plan:
      stage_1_2: "Play strongest opener, win streak if possible. Slam Guinsoo early."
      stage_3: "Build econ, maintain streak. Level 7 on 3-5 if win streaking."
      stage_4: "Level 8 on 4-2, stabilize, level 9 on 4-5 if healthy."
      stage_5_plus: "Roll for Vex 2★, add 5-costs, cap with legendary frontline."
    bis_priority:
      - {unit: TFT17_Vex, items: [GuinsoosRageblade, StatikkShiv, MadredsBloodrazor]}
      - {unit: TFT17_Blitzcrank, items: [JeweledGauntlet, RabadonsDeathcap, UnstableConcoction]}
    augments:
      prismatic_s: [LateGameSpecialist, MaxLevel10]
      gold_s: [LateGameScaling, GildedSteel, UpwardMobility]
      silver_s: [AuraFarming, DuoQueue]
    contest_rate: 0.40  # ⚠️ estimated
    openers: [TFT17_Briar, TFT17_Ezreal, TFT17_Reksai, TFT17_Pantheon]

