# engine/knowledge/item_holders.yaml — Per-unit item family preferences
# Used by Agent 7 (HolderMatrix) for pure YAML lookup.
# Sources: TFTAcademy, Mobalytics (patch 17.1B).
# ⚠️ = estimated — verify before shipping
# ❌ = missing — must be added

# Schema:
#   unit_api:
#     primary_family: "AD" | "AP" | "AD_crit" | "AP_mana" | "tank" | "utility"
#     secondary_family: optional
#     avoid: list of item component families to never put here
#     stage_2: role literal
#     stage_3: role literal
#     stage_4: role literal
#     stage_5_plus: role literal
# Stage roles: "skip" | "hold_only" | "secondary" | "primary"

