# set_17.yaml — Teamfight Tactics Set 17 "Space Gods"
#
# Sources (see research brief for full cites):
# - Shop odds rows 1-10: tftactics.gg/db/rolling (explicitly Set 17 live)
# - Row 11: MetaTFT / tftodds (canonical since Set 14, unchanged)
# - Pool sizes: tftactics.gg rolling page header, verified vs Community Dragon
# - Spike rounds: BunnyMuffins leveling guide Set 17, cross-checked with Mobalytics
#
# WHEN A NEW PATCH DROPS: re-pull numbers from tftactics.gg and tftodds.com. If Riot
# publishes a shop-odds change, update here and nowhere else. Code reads from this file.

set_id: "17"
name: "Space Gods"
patch: "17.1"
released: "2026-04-15"

# Shop odds: row = player level, values = [p_1cost, p_2cost, p_3cost, p_4cost, p_5cost]
# in percent. Sum of each row must be 100.
shop_odds:
  1: [100, 0, 0, 0, 0]
  2: [100, 0, 0, 0, 0]
  3: [75, 25, 0, 0, 0]
  4: [55, 30, 15, 0, 0]
  5: [45, 33, 20, 2, 0]
  6: [30, 40, 25, 5, 0]
  7: [19, 30, 40, 10, 1]
  8: [18, 25, 32, 22, 3]
  9: [10, 20, 25, 35, 10]
  10: [5, 10, 20, 40, 25]
  11: [1, 2, 12, 50, 35]

# Champion pool sizes per cost tier, Set 17.
# The pool is SHARED across all 8 lobby players — so "k remaining" for any specific
# champion starts at `copies_per_champ` and decreases as the lobby buys/holds copies.
pool_sizes:
  1: {copies_per_champ: 22, distinct: 14}  # total tier pool 308
  2: {copies_per_champ: 20, distinct: 13}  # total 260
  3: {copies_per_champ: 17, distinct: 13}  # total 221
  4: {copies_per_champ: 10, distinct: 13}  # total 130
  5: {copies_per_champ: 9, distinct: 9}    # total 81; 10 in catalog minus Zed gate

# 5-cost unlockables — gated out of the pool until unlocked.
# When gated, `distinct` for that tier is effectively reduced and `R_T` drops accordingly.
# TODO: verify this list against Community Dragon on every patch.
gated_units:
- {champion: "Zed", cost: 5, unlock_condition: "Invader Zed hero augment — Zed spawned
    on stage 4-2, then enters shop"}

# Standard spike rounds for each archetype type.
# Used by the SPIKE_ROUND_NEXT rule to surface timing advice.
spike_rounds:
- {stage: "3-1", archetype: "1-cost reroll (pre-roll econ)"}
- {stage: "3-2", archetype: "2-cost reroll roll-down"}
- {stage: "3-5", archetype: "1-cost reroll full roll-down"}
- {stage: "4-1", archetype: "fast-8 prep + stabilize"}
- {stage: "4-2", archetype: "fast-8 roll-down"}
- {stage: "4-5", archetype: "3-cost reroll 3-star hunt"}
- {stage: "5-1", archetype: "fast-9 prep"}

# Set 17 mechanic hooks — things the rules layer needs to know about.
mechanic_hooks:
  realm_of_the_gods:
    trigger_stage: "4-7"
    description: "One-time god-boon pick. Offers scale with HP / streak state."
    gods:
    - id: ahri
      name: "Ahri"
      profile: "flexible — mid-power pick; good neutral option when no clear bias"
    - id: aurelion_sol
      name: "Aurelion Sol"
      profile: "AP scaling — best when running a heavy AP board with multiple casters"
    - id: ekko
      name: "Ekko"
      profile: "tempo — aggressive pick; rewards fast-9 boards and strong stages"
    - id: evelynn
      name: "Evelynn"
      profile: "flexible — cheap offer variant is defensive, aggressive variant is
        tempo"
    - id: kayle
      name: "Kayle"
      profile: "item-scaling — best when you have a completed item to Radiant"
    - id: soraka
      name: "Soraka"
      profile: "win-streak — offensive boon, amplifies strong boards"
    - id: thresh
      name: "Thresh"
      profile: "stabilization — defensive frontline boon, good when low HP"
    - id: varus
      name: "Varus"
      profile: "AD scaling — rewards AD carry boards with strong marksman core"
    - id: yasuo
      name: "Yasuo"
      profile: "melee carry — best when running frontline-heavy or Challenger boards"

